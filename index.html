<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stone Mill – UP Quarry Search</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#222;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
#header{background:#1F4E79;color:#fff;padding:10px 18px;display:flex;align-items:center;gap:14px;flex-shrink:0}
#header h1{font-size:1.15rem;font-weight:700;letter-spacing:.3px}
#header span{font-size:.8rem;opacity:.75;margin-left:4px}
.badge{background:#fff;color:#1F4E79;font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:auto}

/* FILTERS */
#filters{background:#fff;border-bottom:1px solid #d0d6de;padding:8px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
#filters select,#filters input{padding:5px 9px;border:1px solid #c5ccd6;border-radius:5px;font-size:.8rem;background:#fff;color:#333}
#filters input{width:180px}
#filters label{font-size:.8rem;color:#555;display:flex;align-items:center;gap:5px;cursor:pointer}
.btn-reset{padding:5px 12px;background:#1F4E79;color:#fff;border:none;border-radius:5px;font-size:.8rem;cursor:pointer}
.btn-reset:hover{background:#163a5e}
#count-badge{margin-left:auto;font-size:.78rem;color:#666}

/* MAIN */
#main{display:flex;flex:1;overflow:hidden;gap:0}

/* MAP */
#map-wrap{flex:0 0 55%;position:relative;border-right:1px solid #d0d6de}
#map{width:100%;height:100%}

/* DETAIL PANEL */
#detail{flex:0 0 45%;overflow-y:auto;background:#fff;padding:0}
#detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#999;gap:8px}
#detail-empty svg{opacity:.25}
#detail-content{display:none;padding:18px}
.detail-title{font-size:1rem;font-weight:700;color:#1F4E79;margin-bottom:4px}
.detail-stone{font-size:.85rem;color:#555;margin-bottom:10px}
.suit-pill{display:inline-block;padding:3px 10px;border-radius:12px;font-size:.72rem;font-weight:700;letter-spacing:.4px;margin-bottom:12px}
.suit-VIABLE{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7}
.suit-VERIFY{background:#fff8e1;color:#e65100;border:1px solid #ffe082}
.suit-NOT-VIABLE{background:#ffebee;color:#c62828;border:1px solid #ef9a9a}
.score-badge{display:inline-block;padding:2px 9px;background:#1F4E79;color:#fff;border-radius:10px;font-size:.72rem;font-weight:700;margin-left:8px}
.dl{display:grid;grid-template-columns:100px 1fr;gap:4px 10px;font-size:.8rem;margin-bottom:14px}
.dl dt{color:#888;font-weight:600}
.dl dd{color:#222}
.action-link{display:inline-block;padding:6px 14px;border-radius:5px;font-size:.8rem;font-weight:600;text-decoration:none;margin-right:6px;margin-bottom:6px}
.btn-map{background:#1F4E79;color:#fff}
.btn-call{background:#2e7d32;color:#fff}
.detail-notes{background:#f7f9fc;border-left:3px solid #1F4E79;padding:8px 12px;font-size:.79rem;color:#444;border-radius:0 4px 4px 0;margin-top:10px}

/* TABLE */
#table-wrap{flex:0 0 100%;overflow:auto;border-top:2px solid #1F4E79;max-height:35vh;flex-shrink:0;position:relative}
#tbl{width:100%;border-collapse:collapse;font-size:.75rem;background:#fff}
#tbl thead th{background:#1F4E79;color:#fff;padding:7px 8px;text-align:left;position:sticky;top:0;cursor:pointer;white-space:nowrap;z-index:2;user-select:none}
#tbl thead th:hover{background:#163a5e}
#tbl thead th.sort-asc::after{content:" ▲";font-size:.6rem}
#tbl thead th.sort-desc::after{content:" ▼";font-size:.6rem}
#tbl tbody tr{cursor:pointer;transition:background .12s}
#tbl tbody tr:hover{background:#e3edf7}
#tbl tbody tr.active{background:#cce0f5}
#tbl tbody tr:nth-child(even){background:#f7f9fc}
#tbl tbody tr:nth-child(even):hover{background:#e3edf7}
#tbl tbody tr.active:nth-child(even){background:#cce0f5}
#tbl td{padding:5px 8px;border-bottom:1px solid #e8ecf0;vertical-align:top}
.pill{display:inline-block;padding:1px 7px;border-radius:8px;font-size:.68rem;font-weight:700}
.pill-VIABLE{background:#e8f5e9;color:#2e7d32}
.pill-VERIFY{background:#fff3cd;color:#856404}
.pill-NOT{background:#ffebee;color:#c62828}

/* SPLIT LAYOUT */
#lower{display:flex;flex-direction:row;flex:1;overflow:hidden}
#left-col{display:flex;flex-direction:column;flex:0 0 55%;overflow:hidden;border-right:1px solid #d0d6de}
#right-col{flex:0 0 45%;overflow:hidden;display:flex;flex-direction:column}
</style>
</head>
<body>

<div id="header">
  <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="5" fill="#fff3"/><path d="M4 22 L14 6 L24 22 Z" fill="none" stroke="#fff" stroke-width="2"/><rect x="11" y="16" width="6" height="6" fill="#fff"/></svg>
  <h1>Stone Mill <span>UP Quarry Search</span></h1>

</div>

<div id="filters">

  <select id="f-county"><option value="">All Counties</option></select>
  <select id="f-stone"><option value="">All Stone Types</option></select>

  <span id="count-badge"></span>
</div>

<div id="lower">

            <th data-col="owner">Owner</th>

          </tr>
        </thead>
        <tbody id="tbl-body"></tbody>
      </table>
    </div>
  </div>
  <div id="right-col">
    <div id="detail">
      <div id="detail-empty">

        <p>Select a site from the map or table</p>
      </div>
      <div id="detail-content"></div>
    </div>
  </div>
</div>

  {id:"22",stone:"Amphibolite",county:"Dickinson",plss:"T42N R29W S30 SW¼ SE¼",lat:46.008,lon:-87.987,score:null,notes:"Near Groveland Mine road. Very dark green, glistening amphibole. Quarried intermittently for terrazzo/aggregate. Rusty brown on weathered surface. Jointing strikes N10°E.",suit:"VERIFY",owner:"Private / Unknown",address:"Dickinson Co. Register of Deeds, Iron Mountain",phone:"(906) 774-0955",status:"Research parcel ownership. Confirm quarryability for veneer."},
  {id:"24/25",stone:"Granite + Marble (Felch Quarry)",county:"Dickinson",plss:"T42N R28W S26 S½",lat:46.022,lon:-87.758,score:null,notes:"Felch Quarry Co. Site 24: pink granite aplite dikes, 2.5-12 ft wide. Site 25: coarse white marble w/ pale green tremolite. Part-time crushing operation active 1999.",suit:"VERIFY",owner:"Felch Quarry Co. / Private",address:"Dickinson Co. Register of Deeds, Iron Mountain",phone:"(906) 774-0955",status:"Contact Felch Quarry re: stone availability. Confirm current operation status."},
  {id:"36",stone:"Sandstone",county:"Dickinson",plss:"T42N R30W S4 SW¼ NW¼",lat:46.0417,lon:-88.0833,score:null,notes:"Outcrop adjacent to M95. Tan, buff, reddish-brown sandstone, distinctly bedded. Similar to site 21 mineralogically.",suit:"VERIFY",owner:"Lyme Great Lakes Timberlands LLC",address:"1 Wedgewood Ct, PO Box 98, Lyme, NH 03768",phone:"(603) 795-2020",status:"Negotiate surface rights for stone extraction."},
  {id:"38",stone:"Dolostone (Mayville)",county:"Dickinson",plss:"T39N R29W S9 NW¼ NW¼",lat:45.800,lon:-87.935,score:null,notes:"Road metal quarry E of Strawberry Lake, N edge of Norway. Pink, grey, tannish-pink, blue-grey dolostone. Beds 3-12\" thick. Study PLSS note: site location says R29W, historical notes say R24W (likely typo).",suit:"VERIFY",owner:"Private / Unknown",address:"Dickinson Co. Register of Deeds, Iron Mountain",phone:"(906) 774-0955",status:"Confirm current ownership. Research parcel at S9 T39N R29W."},

  {id:"41",stone:"Dolostone (Burnt Bluff)",county:"Delta",plss:"T38N R19W S24",lat:45.825,lon:-87.0833,score:null,notes:"Roen's Quarry. Burnt Bluff Dolostone on Lake Michigan shore cliffs. Historical operation.",suit:"VERIFY",owner:"Roen's Quarry / Unknown",address:"Delta Co. Register of Deeds, Escanaba, MI",phone:"(906) 789-5100",status:"Confirm current ownership & activity status."},

// ── Map ────────────────────────────────────────────────────────────────────
const map = L.map('map').setView([46.5, -87.5], 6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap contributors', maxZoom:18
}).addTo(map);

const COLOR = {VIABLE:'#2e7d32', VERIFY:'#e65100', 'NOT VIABLE':'#c62828'};
const markers = {};

function makeIcon(suit, highlight){
  const c = COLOR[suit]||'#555';
  const s = highlight?'border:2px solid #000;':'';
  return L.divIcon({
    className:'',
    html:`<div style="width:${highlight?14:11}px;height:${highlight?14:11}px;border-radius:50%;background:${c};${s}border:2px solid rgba(0,0,0,0.35);box-shadow:0 1px 4px rgba(0,0,0,.4)"></div>`,
    iconSize:[14,14],iconAnchor:[7,7]
  });
}

SITES.forEach(s=>{
  const m = L.marker([s.lat,s.lon],{icon:makeIcon(s.suit,false)}).addTo(map);
  m.bindTooltip(`<b>#${s.id}</b> ${s.stone}<br><span style="color:${COLOR[s.suit]}">${s.suit}</span>`,{sticky:true});
  m.on('click',()=>selectSite(s.id));
  markers[s.id]=m;
});

// ── Filters ───────────────────────────────────────────────────────────────
const counties = [...new Set(SITES.map(s=>s.county))].sort();
const stones   = [...new Set(SITES.map(s=>s.stone.split(' ')[0]))].sort();
const fCounty = document.getElementById('f-county');
const fStone  = document.getElementById('f-stone');
counties.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;fCounty.appendChild(o)});
stones.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;fStone.appendChild(o)});

document.getElementById('f-suit').addEventListener('change',renderTable);
document.getElementById('f-county').addEventListener('change',renderTable);
document.getElementById('f-stone').addEventListener('change',renderTable);
document.getElementById('f-top11').addEventListener('change',renderTable);
document.getElementById('f-search').addEventListener('input',renderTable);

function resetFilters(){
  document.getElementById('f-suit').value='';
  document.getElementById('f-county').value='';
  document.getElementById('f-stone').value='';
  document.getElementById('f-top11').checked=false;
  document.getElementById('f-search').value='';
  renderTable();
}

function getFiltered(){
  const suit  = document.getElementById('f-suit').value;
  const county= document.getElementById('f-county').value;
  const stone = document.getElementById('f-stone').value;
  const top11 = document.getElementById('f-top11').checked;
  const q     = document.getElementById('f-search').value.toLowerCase();
  return SITES.filter(s=>{
    if(suit   && s.suit!==suit)   return false;
    if(county && s.county!==county) return false;
    if(stone  && !s.stone.startsWith(stone)) return false;
    if(top11  && !s.score)         return false;
    if(q && !`${s.owner} ${s.notes} ${s.status} ${s.stone}`.toLowerCase().includes(q)) return false;
    return true;
  });
}

// ── Table ─────────────────────────────────────────────────────────────────
let sortCol='score', sortDir=-1, activeSiteId=null;

document.querySelectorAll('#tbl thead th').forEach(th=>{
  th.addEventListener('click',()=>{
    const col=th.dataset.col;
    if(sortCol===col) sortDir*=-1; else {sortCol=col;sortDir=-1;}
    document.querySelectorAll('#tbl thead th').forEach(t=>t.className='');
    th.className=sortDir===-1?'sort-desc':'sort-asc';
    renderTable();
  });
});

function suitPill(suit){
  const cls = suit==='VIABLE'?'pill-VIABLE':suit==='VERIFY'?'pill-VERIFY':'pill-NOT';
  return `<span class="pill ${cls}">${suit}</span>`;
}

function renderTable(){
  const filtered = getFiltered();
  // Update map markers visibility
  SITES.forEach(s=>{
    const show = filtered.find(f=>f.id===s.id);
    if(show) markers[s.id].addTo(map);
    else markers[s.id].remove();
  });

  filtered.sort((a,b)=>{
    let av=a[sortCol]??'', bv=b[sortCol]??'';
    if(sortCol==='score'){av=a.score??-1; bv=b.score??-1;}
    if(av<bv) return -sortDir; if(av>bv) return sortDir; return 0;
  });

  document.getElementById('count-badge').textContent=`${filtered.length} of ${SITES.length} sites`;

  const tbody=document.getElementById('tbl-body');
  tbody.innerHTML='';
  filtered.forEach(s=>{
    const tr=document.createElement('tr');
    if(s.id===activeSiteId) tr.classList.add('active');
    tr.innerHTML=`
      <td><b>${s.id}</b></td>
      <td>${s.stone}</td>
      <td>${s.county}</td>
      <td style="font-size:.7rem">${s.plss}</td>
      <td>${suitPill(s.suit)}</td>
      <td style="text-align:center">${s.score?s.score+'/20':'—'}</td>
      <td>${s.owner}</td>
      <td>${s.phone}</td>`;
    tr.addEventListener('click',()=>selectSite(s.id));
    tbody.appendChild(tr);
  });
}

// ── Detail Panel ──────────────────────────────────────────────────────────
function selectSite(id){
  activeSiteId=id;
  const s=SITES.find(x=>x.id===id);
  if(!s) return;

  // Highlight marker
  Object.entries(markers).forEach(([mid,m])=>{
    m.setIcon(makeIcon(SITES.find(x=>x.id===mid).suit, mid===id));
  });
  map.setView([s.lat,s.lon],10,{animate:true});

  // Detail panel
  document.getElementById('detail-empty').style.display='none';
  const dc=document.getElementById('detail-content');
  dc.style.display='block';
  const scoreHtml=s.score?`<span class="score-badge">Score: ${s.score}/20</span>`:'';
  const suitCls='suit-'+s.suit.replace(/ /g,'-');
  const mapsUrl=`https://www.google.com/maps?q=${s.lat},${s.lon}`;
  const phoneNum=s.phone.replace(/[^\d]/g,'');
  const callHtml=phoneNum.length>=10&&!s.phone.includes('XXXX')?
    `<a class="action-link btn-call" href="tel:${phoneNum}">📞 ${s.phone}</a>`:'';

  dc.innerHTML=`
    <div class="detail-title">Site #${s.id} ${scoreHtml}</div>
    <div class="detail-stone">${s.stone} &mdash; ${s.county} County</div>
    <span class="${suitCls} suit-pill">${s.suit}</span>
    <dl class="dl">
      <dt>PLSS</dt><dd>${s.plss}</dd>
      <dt>GPS</dt><dd>${s.lat}, ${s.lon}</dd>
      <dt>Owner</dt><dd>${s.owner}</dd>
      <dt>Address</dt><dd>${s.address}</dd>
      <dt>Phone</dt><dd>${s.phone}</dd>
    </dl>
    <a class="action-link btn-map" href="${mapsUrl}" target="_blank">🗺 Open in Maps</a>
    ${callHtml}
    <div class="detail-notes"><b>Notes:</b> ${s.notes}<br><br><b>Action:</b> ${s.status}</div>`;

  // Highlight row
  renderTable();
}

// ── Init ──────────────────────────────────────────────────────────────────
renderTable();
</script>
</body>
</html>
